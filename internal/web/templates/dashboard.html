{{define "dashboard"}}
<h1>Stations</h1>
{{range .Stations}}
<div style="margin-bottom: 1rem; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px;">
    <h2 style="margin: 0;">
        <a href="/stations/{{.Name}}">{{.Name}}</a>
    </h2>
    <p class="now-playing" hx-get="/stations/{{.Name}}/status" hx-trigger="every 5s">
        {{.TrackCount}} tracks
    </p>
    <p>Stream URL: <code>http://localhost:{{$.Port}}/stream/{{.Mount}}</code></p>
</div>
{{else}}
<p>No stations configured.</p>
{{end}}

<details style="margin-top: 1.5rem;">
    <summary>New Station</summary>
    <form hx-post="/stations" hx-target="body" hx-swap="outerHTML" style="margin-top: 0.5rem;">
        <label>Name: <input type="text" name="name" required></label><br>
        <label>Mount: <input type="text" name="mount" placeholder="/my-station" required></label><br>
        <button type="submit" style="margin-top: 0.5rem;">Create</button>
    </form>
</details>
{{end}}
