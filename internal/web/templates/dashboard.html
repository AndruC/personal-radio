{{define "dashboard"}}
<h1>► STATION CONTROL</h1>
{{range .Stations}}
<div class="station-card">
    <h2><a href="/stations/{{.Name}}">{{.Name}}</a></h2>
    <div class="meta now-playing" hx-get="/stations/{{.Name}}/status" hx-trigger="every 5s">
        {{.TrackCount}} TRACKS IN ROTATION
    </div>
    <div class="stream-url">http://localhost:{{$.Port}}/stream/{{.Mount}}</div>
</div>
{{else}}
<div class="empty">NO STATIONS CONFIGURED // ADD ONE BELOW</div>
{{end}}

<details>
    <summary>+ NEW STATION</summary>
    <form method="post" action="/stations" style="margin-top: 0.5rem;">
        <label>NAME: <input type="text" name="name" required></label>
        <label>MOUNT: <input type="text" name="mount" placeholder="/my-station" required></label>
        <button type="submit" style="margin-top: 0.5rem;">CREATE</button>
    </form>
</details>
{{end}}
