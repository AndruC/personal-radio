{{define "library"}}
<h1>► MUSIC LIBRARY</h1>

<input type="search" name="q"
       hx-get="/library"
       hx-trigger="keyup changed delay:200ms"
       hx-target="#results"
       hx-swap="innerHTML"
       placeholder="SEARCH TRACKS...">

<div id="results">
{{template "library-results" .}}
</div>
{{end}}

{{define "library-results"}}
<p style="color:var(--neon-purple); margin-bottom:0.5rem;">{{len .Tracks}} TRACKS{{if .Query}} MATCHING "{{.Query}}"{{end}}</p>
<table>
    <thead><tr><th>NAME</th><th>PATH</th></tr></thead>
    <tbody>
    {{range .Tracks}}
    <tr>
        <td>► {{.Name}}</td>
        <td style="color:#666; font-size:0.85em;">{{.Path}}</td>
    </tr>
    {{else}}
    <tr><td colspan="2" class="empty">NO TRACKS FOUND</td></tr>
    {{end}}
    </tbody>
</table>
{{end}}
