<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADIO // STREAMING SYSTEM</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --bg: #0a0a0c;
            --surface: #111118;
            --neon-green: #39ff14;
            --neon-pink: #ff2d95;
            --neon-cyan: #00f0ff;
            --neon-yellow: #ffe600;
            --neon-purple: #b44dff;
            --border-glow: #39ff1488;
            --text: #c0c0c0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 0;
            /* scanlines */
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
        }

        /* --- HEADER / LOGO --- */
        nav {
            background: var(--surface);
            border-bottom: 3px solid var(--neon-pink);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            box-shadow: 0 0 20px var(--border-glow), inset 0 -1px 0 var(--neon-cyan);
        }
        nav::before {
            content: "◆ RADIO ◆";
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green), 0 0 30px var(--neon-green);
            letter-spacing: 0.25em;
        }
        nav a {
            color: var(--neon-cyan);
            text-decoration: none;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            padding: 0.3rem 0.8rem;
            border: 1px solid transparent;
            transition: all 0.15s;
        }
        nav a:hover {
            border-color: var(--neon-cyan);
            text-shadow: 0 0 8px var(--neon-cyan);
            box-shadow: 0 0 10px #00f0ff44;
        }

        /* --- MAIN CONTAINER --- */
        main {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        /* --- HEADINGS --- */
        h1 {
            font-size: 2rem;
            color: var(--neon-yellow);
            text-shadow: 0 0 12px var(--neon-yellow), 0 0 30px #ffe60055;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 1.5rem;
            border-bottom: 2px dashed var(--neon-purple);
            padding-bottom: 0.5rem;
        }
        h2 {
            color: var(--neon-green);
            text-shadow: 0 0 6px var(--neon-green);
            letter-spacing: 0.1em;
            margin: 0.5rem 0;
        }
        h3 {
            color: var(--neon-pink);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 1rem 0 0.5rem;
        }

        /* --- STATION CARDS --- */
        .station-card {
            background: var(--surface);
            border: 2px solid var(--neon-cyan);
            margin-bottom: 1.5rem;
            padding: 1.2rem;
            position: relative;
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 0);
            box-shadow: 0 0 15px #00f0ff22, inset 0 0 30px #00000088;
            transition: box-shadow 0.2s;
        }
        .station-card:hover {
            box-shadow: 0 0 30px #00f0ff44, 0 0 60px #00f0ff11, inset 0 0 30px #00000088;
        }
        .station-card h2 {
            margin-top: 0;
            font-size: 1.4rem;
        }
        .station-card h2 a {
            color: var(--neon-green);
            text-decoration: none;
        }
        .station-card h2 a:hover {
            text-decoration: underline;
        }
        .station-card .meta {
            color: #888;
            font-size: 0.85rem;
            margin: 0.3rem 0;
        }
        .station-card .stream-url {
            display: inline-block;
            background: #000;
            color: var(--neon-yellow);
            padding: 0.3rem 0.7rem;
            font-size: 0.85rem;
            border: 1px solid var(--neon-yellow);
            margin-top: 0.5rem;
            text-shadow: 0 0 5px var(--neon-yellow);
        }

        /* --- BUTTONS --- */
        button, .btn {
            font-family: inherit;
            background: #000;
            color: var(--neon-green);
            border: 2px solid var(--neon-green);
            padding: 0.35rem 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.85rem;
            transition: all 0.15s;
            box-shadow: 0 0 5px var(--neon-green), inset 0 0 5px #000;
        }
        button:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 15px var(--neon-green), 0 0 30px #39ff1466;
        }
        button.danger {
            color: var(--neon-pink);
            border-color: var(--neon-pink);
            box-shadow: 0 0 5px var(--neon-pink);
        }
        button.danger:hover {
            background: var(--neon-pink);
            color: #000;
            box-shadow: 0 0 15px var(--neon-pink);
        }

        /* --- FORMS & INPUTS --- */
        input, select {
            font-family: inherit;
            background: #000;
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            padding: 0.4rem 0.7rem;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.15s;
        }
        input:focus, select:focus {
            border-color: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
            color: var(--neon-green);
        }
        input[type="search"] {
            width: 100%;
            margin-bottom: 0.8rem;
            font-size: 1rem;
            padding: 0.6rem;
            border-width: 2px;
            letter-spacing: 0.1em;
        }

        /* --- TABLES --- */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }
        th {
            text-align: left;
            color: var(--neon-yellow);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 0.6rem 0.5rem;
            border-bottom: 2px solid var(--neon-purple);
            font-size: 0.85rem;
        }
        td {
            padding: 0.5rem;
            border-bottom: 1px solid #222;
            font-size: 0.9rem;
        }
        tr:hover td {
            background: #ffffff05;
        }

        /* --- LISTS --- */
        ul {
            list-style: none;
            padding: 0;
        }
        ul#sources-list li {
            background: #000;
            border: 1px solid #333;
            padding: 0.5rem 0.8rem;
            margin-bottom: 0.3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }
        ul#sources-list li:hover {
            border-color: var(--neon-cyan);
        }

        /* --- DETAILS / NEW STATION --- */
        details {
            margin-top: 2rem;
            border: 1px dashed var(--neon-purple);
            padding: 0.8rem 1rem;
        }
        details summary {
            color: var(--neon-purple);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-size: 0.9rem;
        }
        details form {
            margin-top: 0.8rem;
        }
        details label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text);
            font-size: 0.9rem;
        }

        /* --- STATUS / NOW PLAYING --- */
        .now-playing {
            color: var(--neon-green);
            font-style: normal;
            text-shadow: 0 0 6px var(--neon-green);
        }

        /* --- HR --- */
        hr {
            display: none;
        }

        /* --- LINKS --- */
        a {
            color: var(--neon-cyan);
            text-decoration: none;
        }
        a:hover {
            text-shadow: 0 0 8px var(--neon-cyan);
        }

        /* --- EMPTY STATE --- */
        .empty {
            color: #555;
            font-style: italic;
            padding: 2rem 0;
            text-align: center;
            border: 1px dashed #333;
        }

        /* --- BACK LINK --- */
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: var(--neon-purple);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-size: 0.85rem;
        }

        /* --- CORNER CUTS on cards --- */
        .corner-cut {
            clip-path: polygon(0 12px, 12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%);
        }
    </style>
</head>
<body>
    <nav>
        <a href="/">[ STATIONS ]</a>
        <a href="/library">[ LIBRARY ]</a>
    </nav>
    <main>
    {{if eq .Template "dashboard"}}{{template "dashboard" .}}{{end}}
    {{if eq .Template "station"}}{{template "station" .}}{{end}}
    {{if eq .Template "library"}}{{template "library" .}}{{end}}
    </main>
</body>
</html>
